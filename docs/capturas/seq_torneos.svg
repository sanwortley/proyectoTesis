<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 300" font-family="Arial,sans-serif" font-size="10">
  <rect width="620" height="300" fill="white"/>
  <text x="310" y="18" text-anchor="middle" font-size="13" font-weight="bold">Diagrama de Secuencia — Ver Torneos</text>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto"><polygon points="0,0 8,3.5 0,7" fill="#333"/></marker>
    <marker id="open" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7" fill="none" stroke="#333" stroke-width="1.2"/></marker>
  </defs>
  <rect x="20" y="30" width="100" height="28" rx="3" fill="#2E4A7A"/>
  <text x="70" y="48" text-anchor="middle" fill="white" font-weight="bold">Espectador</text>
  <rect x="178" y="30" width="90" height="28" rx="3" fill="#2E4A7A"/>
  <text x="223" y="48" text-anchor="middle" fill="white" font-weight="bold">Frontend</text>
  <rect x="328" y="30" width="100" height="28" rx="3" fill="#4a7a2e"/>
  <text x="378" y="48" text-anchor="middle" fill="white" font-weight="bold">Backend API</text>
  <rect x="488" y="30" width="100" height="28" rx="3" fill="#7a2e2e"/>
  <text x="538" y="48" text-anchor="middle" fill="white" font-weight="bold">Base de Datos</text>

  <line x1="70" y1="58" x2="70" y2="295" stroke="#999" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="223" y1="58" x2="223" y2="295" stroke="#999" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="378" y1="58" x2="378" y2="295" stroke="#999" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="538" y1="58" x2="538" y2="295" stroke="#999" stroke-width="1" stroke-dasharray="5,4"/>

  <line x1="70" y1="90" x2="218" y2="90" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="145" y="85" text-anchor="middle" font-size="9">1. accede a /torneos</text>
  <line x1="223" y1="112" x2="373" y2="112" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="298" y="107" text-anchor="middle" font-size="9">2. GET /api/torneos?mes=7</text>
  <line x1="378" y1="132" x2="533" y2="132" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="455" y="127" text-anchor="middle" font-size="9">3. SELECT torneos WHERE mes=julio</text>
  <line x1="533" y1="152" x2="383" y2="152" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="455" y="165" text-anchor="middle" font-size="9">4. [{torneos...}]</text>
  <line x1="373" y1="178" x2="228" y2="178" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="300" y="173" text-anchor="middle" font-size="9">5. lista de torneos</text>
  <line x1="218" y1="198" x2="73" y2="198" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="145" y="193" text-anchor="middle" font-size="9">6. muestra torneos con filtro</text>

  <line x1="70" y1="218" x2="218" y2="218" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="145" y="213" text-anchor="middle" font-size="9">7. selecciona torneo → "Ver Fixture"</text>
  <line x1="223" y1="238" x2="373" y2="238" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="298" y="233" text-anchor="middle" font-size="9">8. GET /api/torneos/:id/grupos</text>
  <line x1="373" y1="258" x2="228" y2="258" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="300" y="253" text-anchor="middle" font-size="9">9. {grupos, partidos, posiciones}</text>
  <line x1="218" y1="278" x2="73" y2="278" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="145" y="273" text-anchor="middle" font-size="9">10. renderiza fixture / ranking</text>
</svg>
