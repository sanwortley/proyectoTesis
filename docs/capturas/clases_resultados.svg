<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 290" font-family="Arial,sans-serif" font-size="10">
  <rect width="700" height="290" fill="white"/>
  <text x="350" y="18" text-anchor="middle" font-size="13" font-weight="bold">Diagrama de Clases — Fixture y Resultados</text>
  <defs>
    <marker id="open" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#333" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- ResultadosForm -->
  <rect x="10" y="30" width="155" height="18" rx="2" fill="#2E4A7A"/>
  <text x="87" y="43" text-anchor="middle" fill="white" font-size="9">«boundary»</text>
  <rect x="10" y="48" width="155" height="18" fill="#dce9f8" stroke="#2E4A7A"/>
  <text x="87" y="61" text-anchor="middle" font-weight="bold">ResultadosForm</text>
  <rect x="10" y="66" width="155" height="52" fill="white" stroke="#2E4A7A"/>
  <text x="20" y="79" font-size="9">– torneoId: int</text>
  <text x="20" y="92" font-size="9">– grupoId: int</text>
  <text x="20" y="105" font-size="9">– resultados: array</text>
  <rect x="10" y="118" width="155" height="20" fill="#f0f4fc" stroke="#2E4A7A"/>
  <text x="20" y="131" font-size="9">+ guardarGrupo(id)</text>

  <!-- ResultadosController -->
  <rect x="220" y="30" width="165" height="18" rx="2" fill="#4a7a2e"/>
  <text x="302" y="43" text-anchor="middle" fill="white" font-size="9">«control»</text>
  <rect x="220" y="48" width="165" height="18" fill="#e8f5d8" stroke="#4a7a2e"/>
  <text x="302" y="61" text-anchor="middle" font-weight="bold">ResultadosController</text>
  <rect x="220" y="66" width="165" height="20" fill="white" stroke="#4a7a2e"/>
  <text x="230" y="79" font-size="9">(sin atributos de estado)</text>
  <rect x="220" y="86" width="165" height="65" fill="#f4fcea" stroke="#4a7a2e"/>
  <text x="230" y="99" font-size="9">+ guardarResultados()</text>
  <text x="230" y="112" font-size="9">+ generarPlayoff(torneoId)</text>
  <text x="230" y="125" font-size="9">+ actualizarRanking()</text>
  <text x="230" y="138" font-size="9">+ avanzarGanador()</text>

  <!-- PartidoGrupo (entity) -->
  <rect x="445" y="30" width="155" height="18" rx="2" fill="#7a2e2e"/>
  <text x="522" y="43" text-anchor="middle" fill="white" font-size="9">«entity»</text>
  <rect x="445" y="48" width="155" height="18" fill="#f8e8e8" stroke="#7a2e2e"/>
  <text x="522" y="61" text-anchor="middle" font-weight="bold">PartidoGrupo</text>
  <rect x="445" y="66" width="155" height="90" fill="white" stroke="#7a2e2e"/>
  <text x="455" y="79" font-size="9">– id: int (PK)</text>
  <text x="455" y="92" font-size="9">– grupo_id: int (FK)</text>
  <text x="455" y="105" font-size="9">– equipo1_id / equipo2_id</text>
  <text x="455" y="118" font-size="9">– set1..set3 por equipo</text>
  <text x="455" y="131" font-size="9">– estado: varchar</text>

  <!-- PartidoLlave (entity) -->
  <rect x="445" y="185" width="155" height="18" rx="2" fill="#7a2e2e"/>
  <text x="522" y="198" text-anchor="middle" fill="white" font-size="9">«entity»</text>
  <rect x="445" y="203" width="155" height="18" fill="#f8e8e8" stroke="#7a2e2e"/>
  <text x="522" y="216" text-anchor="middle" font-weight="bold">PartidoLlave</text>
  <rect x="445" y="221" width="155" height="65" fill="white" stroke="#7a2e2e"/>
  <text x="455" y="234" font-size="9">– id: int (PK)</text>
  <text x="455" y="247" font-size="9">– ronda: varchar</text>
  <text x="455" y="260" font-size="9">– ganador_id: int (FK)</text>
  <text x="455" y="273" font-size="9">– next_match_id: int</text>

  <!-- Relations -->
  <line x1="165" y1="100" x2="220" y2="100" stroke="#333" stroke-width="1.5" marker-end="url(#open)"/>
  <line x1="385" y1="100" x2="445" y2="90" stroke="#333" stroke-width="1.5" marker-end="url(#open)"/>
  <text x="390" y="87" font-size="8">guarda</text>
  <line x1="385" y1="115" x2="445" y2="220" stroke="#333" stroke-width="1.5" marker-end="url(#open)"/>
  <text x="390" y="175" font-size="8">genera</text>
</svg>
