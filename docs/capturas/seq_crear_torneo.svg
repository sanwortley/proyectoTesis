<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 310" font-family="Arial,sans-serif" font-size="10">
  <rect width="640" height="310" fill="white"/>
  <text x="320" y="18" text-anchor="middle" font-size="13" font-weight="bold">Diagrama de Secuencia — Crear Torneo</text>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto"><polygon points="0,0 8,3.5 0,7" fill="#333"/></marker>
    <marker id="open" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7" fill="none" stroke="#333" stroke-width="1.2"/></marker>
  </defs>
  <rect x="20" y="30" width="100" height="28" rx="3" fill="#2E4A7A"/>
  <text x="70" y="48" text-anchor="middle" fill="white" font-weight="bold">Organizador</text>
  <rect x="175" y="30" width="90" height="28" rx="3" fill="#2E4A7A"/>
  <text x="220" y="48" text-anchor="middle" fill="white" font-weight="bold">Frontend</text>
  <rect x="325" y="30" width="100" height="28" rx="3" fill="#4a7a2e"/>
  <text x="375" y="48" text-anchor="middle" fill="white" font-weight="bold">Backend API</text>
  <rect x="495" y="30" width="100" height="28" rx="3" fill="#7a2e2e"/>
  <text x="545" y="48" text-anchor="middle" fill="white" font-weight="bold">Base de Datos</text>

  <line x1="70" y1="58" x2="70" y2="305" stroke="#999" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="220" y1="58" x2="220" y2="305" stroke="#999" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="375" y1="58" x2="375" y2="305" stroke="#999" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="545" y1="58" x2="545" y2="305" stroke="#999" stroke-width="1" stroke-dasharray="5,4"/>

  <line x1="70" y1="90" x2="215" y2="90" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="143" y="85" text-anchor="middle" font-size="9">1. completa formulario nuevo torneo</text>
  <line x1="220" y1="115" x2="370" y2="115" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="295" y="110" text-anchor="middle" font-size="9">2. POST /api/torneos {datos}</text>
  <line x1="375" y1="140" x2="540" y2="140" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="457" y="135" text-anchor="middle" font-size="9">3. INSERT INTO torneo VALUES(...)</text>
  <line x1="540" y1="160" x2="380" y2="160" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="457" y="173" text-anchor="middle" font-size="9">4. {id_torneo: 7}</text>
  <line x1="370" y1="185" x2="225" y2="185" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="297" y="180" text-anchor="middle" font-size="9">5. 201 Created {torneo}</text>
  <line x1="215" y1="210" x2="75" y2="210" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="143" y="205" text-anchor="middle" font-size="9">6. muestra confirmación</text>

  <!-- Generar grupos -->
  <text x="320" y="238" text-anchor="middle" font-size="9" fill="#555">— el organizador presiona "Generar Grupos" —</text>
  <line x1="70" y1="248" x2="215" y2="248" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="143" y="243" text-anchor="middle" font-size="9">7. click "Generar Grupos"</text>
  <line x1="220" y1="268" x2="370" y2="268" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="295" y="263" text-anchor="middle" font-size="9">8. POST /torneos/:id/generar-grupos</text>
  <line x1="370" y1="288" x2="225" y2="288" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="297" y="283" text-anchor="middle" font-size="9">9. {mensaje: "Grupos generados"}</text>
</svg>
