<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 870 570" font-family="Arial,sans-serif" font-size="10">
  <rect width="870" height="570" fill="white"/>
  <text x="435" y="17" text-anchor="middle" font-size="13" font-weight="bold">UCU — Módulo Login</text>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7" fill="none" stroke="#333" stroke-width="1.2"/>
    </marker>
    <marker id="blu" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7" fill="none" stroke="#2E4A7A" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Boundary -->
  <rect x="145" y="28" width="700" height="525" rx="6" fill="#f7f9fc" stroke="#2E4A7A" stroke-width="1.5"/>
  <text x="495" y="46" text-anchor="middle" font-size="10" font-weight="bold" fill="#2E4A7A">Sistema — Módulo Login</text>

  <!-- Actor: Usuario -->
  <circle cx="60" cy="185" r="14" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="199" x2="60" y2="235" stroke="#333" stroke-width="1.5"/>
  <line x1="42" y1="213" x2="78" y2="213" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="235" x2="42" y2="258" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="235" x2="78" y2="258" stroke="#333" stroke-width="1.5"/>
  <text x="60" y="272" text-anchor="middle" font-size="9">Usuario</text>

  <!-- Actor: Visitante -->
  <circle cx="60" cy="390" r="14" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="404" x2="60" y2="440" stroke="#333" stroke-width="1.5"/>
  <line x1="42" y1="418" x2="78" y2="418" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="440" x2="42" y2="463" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="440" x2="78" y2="463" stroke="#333" stroke-width="1.5"/>
  <text x="60" y="477" text-anchor="middle" font-size="9">Visitante</text>

  <!-- UC Central: Iniciar Sesión -->
  <ellipse cx="340" cy="190" rx="88" ry="28" fill="#d6e4f7" stroke="#2E4A7A" stroke-width="1.5"/>
  <text x="340" y="186" text-anchor="middle" font-weight="bold">Iniciar Sesión</text>
  <text x="340" y="200" text-anchor="middle" font-size="9">(Login)</text>

  <!-- UC: Mostrar navbar -->
  <ellipse cx="580" cy="70" rx="88" ry="23" fill="#e8f0fb" stroke="#2E4A7A" stroke-width="1.2"/>
  <text x="580" y="75" text-anchor="middle">Mostrar navbar</text>

  <!-- UC: Validar Credenciales -->
  <ellipse cx="580" cy="160" rx="88" ry="23" fill="#e8f0fb" stroke="#2E4A7A" stroke-width="1.2"/>
  <text x="580" y="165" text-anchor="middle">Validar Credenciales</text>

  <!-- UC: Registrar Auditoría -->
  <ellipse cx="580" cy="250" rx="88" ry="23" fill="#e8f0fb" stroke="#2E4A7A" stroke-width="1.2"/>
  <text x="580" y="255" text-anchor="middle">Registrar Auditoría</text>

  <!-- UC: Redirigir según rol -->
  <ellipse cx="580" cy="340" rx="88" ry="23" fill="#e8f0fb" stroke="#2E4A7A" stroke-width="1.2"/>
  <text x="580" y="345" text-anchor="middle">Redirigir según Rol</text>

  <!-- UC: Entrar como Invitado -->
  <ellipse cx="340" cy="415" rx="90" ry="24" fill="#d6e4f7" stroke="#2E4A7A" stroke-width="1.5"/>
  <text x="340" y="420" text-anchor="middle">Entrar como Invitado</text>

  <!-- Extends: Mostrar error de login -->
  <ellipse cx="340" cy="305" rx="92" ry="24" fill="#fce8e8" stroke="#c00" stroke-width="1.2"/>
  <text x="340" y="301" text-anchor="middle">Mostrar error</text>
  <text x="340" y="315" text-anchor="middle">de login</text>

  <!-- Extends: Mostrar error credenciales -->
  <ellipse cx="760" cy="160" rx="88" ry="24" fill="#fce8e8" stroke="#c00" stroke-width="1.2"/>
  <text x="760" y="156" text-anchor="middle">Mostrar error</text>
  <text x="760" y="170" text-anchor="middle">credenciales</text>

  <!-- Extends: Navegar (navbar child) -->
  <ellipse cx="760" cy="70" rx="78" ry="23" fill="#f0f4f0" stroke="#4a7a2e" stroke-width="1"/>
  <text x="760" y="66" text-anchor="middle" font-size="9">Navegar Torneos /</text>
  <text x="760" y="79" text-anchor="middle" font-size="9">Ranking / Home</text>

  <!-- Extends: Aplicar diseño responsive -->
  <ellipse cx="200" cy="90" rx="85" ry="24" fill="#f0f8f0" stroke="#4a7a2e" stroke-width="1"/>
  <text x="200" y="86" text-anchor="middle" font-size="9">Aplicar diseño</text>
  <text x="200" y="100" text-anchor="middle" font-size="9">responsive</text>

  <!-- Extends: Respetar estilo gráfico -->
  <ellipse cx="200" cy="305" rx="85" ry="24" fill="#f0f8f0" stroke="#4a7a2e" stroke-width="1"/>
  <text x="200" y="301" text-anchor="middle" font-size="9">Respetar estilo</text>
  <text x="200" y="315" text-anchor="middle" font-size="9">gráfico</text>

  <!-- LÍNEAS -->
  <!-- Actor → Iniciar Sesión -->
  <line x1="74" y1="190" x2="252" y2="190" stroke="#333" stroke-width="1.3"/>
  <!-- Actor Visitante → Entrar como Invitado -->
  <line x1="74" y1="415" x2="250" y2="415" stroke="#333" stroke-width="1.3"/>

  <!-- Iniciar Sesión -use-> Mostrar navbar -->
  <line x1="395" y1="170" x2="492" y2="84" stroke="#2E4A7A" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#blu)"/>
  <text x="435" y="120" text-anchor="middle" font-size="8" fill="#2E4A7A">«use»</text>

  <!-- Iniciar Sesión -use-> Validar Credenciales -->
  <line x1="428" y1="185" x2="492" y2="162" stroke="#2E4A7A" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#blu)"/>
  <text x="462" y="170" text-anchor="middle" font-size="8" fill="#2E4A7A">«use»</text>

  <!-- Iniciar Sesión -use-> Registrar Auditoría -->
  <line x1="428" y1="200" x2="492" y2="248" stroke="#2E4A7A" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#blu)"/>
  <text x="462" y="232" text-anchor="middle" font-size="8" fill="#2E4A7A">«use»</text>

  <!-- Iniciar Sesión -use-> Redirigir según rol -->
  <line x1="410" y1="214" x2="492" y2="332" stroke="#2E4A7A" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#blu)"/>
  <text x="440" y="280" text-anchor="middle" font-size="8" fill="#2E4A7A">«use»</text>

  <!-- Iniciar Sesión Extends→ Mostrar error de login -->
  <line x1="340" y1="218" x2="340" y2="281" stroke="#333" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="313" y="252" text-anchor="middle" font-size="8">Extends</text>

  <!-- Validar Credenciales Extends→ Mostrar error credenciales -->
  <line x1="668" y1="160" x2="672" y2="160" stroke="#333" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="700" y="148" text-anchor="middle" font-size="8">Extends</text>

  <!-- Mostrar navbar Extends→ Navegar -->
  <line x1="668" y1="70" x2="682" y2="70" stroke="#333" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="700" y="56" text-anchor="middle" font-size="8">Extends</text>

  <!-- Entrar como Invitado -use-> Mostrar navbar -->
  <line x1="430" y1="410" x2="530" y2="88" stroke="#2E4A7A" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#blu)"/>
  <text x="500" y="280" text-anchor="middle" font-size="8" fill="#2E4A7A">«use»</text>

  <!-- Aplicar responsive Extends→ Iniciar Sesión -->
  <line x1="270" y1="103" x2="295" y2="167" stroke="#4a7a2e" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="266" y="140" text-anchor="middle" font-size="8" fill="#4a7a2e">Extends</text>

  <!-- Respetar estilo Extends→ Iniciar Sesión -->
  <line x1="270" y1="292" x2="295" y2="212" stroke="#4a7a2e" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="265" y="248" text-anchor="middle" font-size="8" fill="#4a7a2e">Extends</text>

  <!-- Leyenda -->
  <rect x="160" y="492" width="355" height="50" rx="3" fill="#f9f9f9" stroke="#ccc"/>
  <text x="338" y="508" text-anchor="middle" font-weight="bold" font-size="9">Leyenda</text>
  <line x1="170" y1="522" x2="205" y2="522" stroke="#2E4A7A" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#blu)"/>
  <text x="210" y="526" font-size="8">«use» — el caso de uso incluye otro</text>
  <line x1="170" y1="537" x2="205" y2="537" stroke="#333" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="210" y="541" font-size="8">Extends — comportamiento extendido (alternativo)</text>
</svg>
