<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" font-family="Arial,sans-serif" font-size="10">
  <rect width="980" height="620" fill="white"/>
  <text x="490" y="17" text-anchor="middle" font-size="13" font-weight="bold">UCU — Módulo Fixture y Resultados</text>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7" fill="none" stroke="#333" stroke-width="1.2"/>
    </marker>
    <marker id="blu" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7" fill="none" stroke="#2E4A7A" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Boundary -->
  <rect x="145" y="28" width="815" height="570" rx="6" fill="#f7f9fc" stroke="#2E4A7A" stroke-width="1.5"/>
  <text x="552" y="46" text-anchor="middle" font-size="10" font-weight="bold" fill="#2E4A7A">Sistema — Módulo Fixture y Resultados</text>

  <!-- Actor: Organizador -->
  <circle cx="60" cy="280" r="14" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="294" x2="60" y2="330" stroke="#333" stroke-width="1.5"/>
  <line x1="42" y1="308" x2="78" y2="308" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="330" x2="42" y2="353" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="330" x2="78" y2="353" stroke="#333" stroke-width="1.5"/>
  <text x="60" y="367" text-anchor="middle" font-size="9">Organizador</text>

  <!-- UC Central: Cargar Resultados -->
  <ellipse cx="390" cy="280" rx="100" ry="30" fill="#d6e4f7" stroke="#2E4A7A" stroke-width="1.5"/>
  <text x="390" y="276" text-anchor="middle" font-weight="bold">Cargar Resultados</text>
  <text x="390" y="291" text-anchor="middle" font-size="9">(Fixture)</text>

  <!-- UC: Mostrar navbar -->
  <ellipse cx="390" cy="90" rx="90" ry="24" fill="#e8f0fb" stroke="#2E4A7A" stroke-width="1.2"/>
  <text x="390" y="95" text-anchor="middle">Mostrar navbar</text>

  <!-- Navbar extends -->
  <ellipse cx="260" cy="52" rx="80" ry="19" fill="#f0f4f0" stroke="#888" stroke-width="1"/>
  <text x="260" y="57" text-anchor="middle" font-size="8.5">Navegar Torneos / Home</text>
  <ellipse cx="530" cy="52" rx="80" ry="19" fill="#f0f4f0" stroke="#888" stroke-width="1"/>
  <text x="530" y="57" text-anchor="middle" font-size="8.5">Navegar Ranking</text>

  <!-- UC: Ingresar sets del partido -->
  <ellipse cx="670" cy="150" rx="95" ry="24" fill="#e8f0fb" stroke="#2E4A7A" stroke-width="1.2"/>
  <text x="670" y="146" text-anchor="middle">Ingresar sets</text>
  <text x="670" y="160" text-anchor="middle">del partido</text>

  <!-- UC: Validar resultado ingresado -->
  <ellipse cx="670" cy="240" rx="95" ry="24" fill="#e8f0fb" stroke="#2E4A7A" stroke-width="1.2"/>
  <text x="670" y="236" text-anchor="middle">Validar resultado</text>
  <text x="670" y="250" text-anchor="middle">ingresado</text>

  <!-- UC: Guardar partido en BD -->
  <ellipse cx="670" cy="330" rx="95" ry="24" fill="#e8f0fb" stroke="#2E4A7A" stroke-width="1.2"/>
  <text x="670" y="326" text-anchor="middle">Guardar partido</text>
  <text x="670" y="340" text-anchor="middle">en BD</text>

  <!-- UC: Actualizar posiciones de grupo -->
  <ellipse cx="670" cy="420" rx="95" ry="24" fill="#e8f0fb" stroke="#2E4A7A" stroke-width="1.2"/>
  <text x="670" y="416" text-anchor="middle">Actualizar posiciones</text>
  <text x="670" y="430" text-anchor="middle">del grupo</text>

  <!-- UC: Generar llave playoff -->
  <ellipse cx="390" cy="430" rx="95" ry="24" fill="#d6e4f7" stroke="#2E4A7A" stroke-width="1.5"/>
  <text x="390" y="426" text-anchor="middle">Generar llave</text>
  <text x="390" y="440" text-anchor="middle">Playoff (snake seeding)</text>

  <!-- UC: Registrar resultado playoff -->
  <ellipse cx="390" cy="530" rx="95" ry="24" fill="#e8f0fb" stroke="#2E4A7A" stroke-width="1.2"/>
  <text x="390" y="526" text-anchor="middle">Registrar resultado</text>
  <text x="390" y="540" text-anchor="middle">de Playoff</text>

  <!-- Extends: Mostrar error de resultado -->
  <ellipse cx="860" cy="240" rx="88" ry="24" fill="#fce8e8" stroke="#c00" stroke-width="1.2"/>
  <text x="860" y="236" text-anchor="middle">Mostrar error</text>
  <text x="860" y="250" text-anchor="middle">de resultado</text>

  <!-- Extends: Mostrar mensaje de éxito -->
  <ellipse cx="860" cy="330" rx="88" ry="24" fill="#e8fce8" stroke="#4a7a2e" stroke-width="1.2"/>
  <text x="860" y="326" text-anchor="middle">Mostrar mensaje</text>
  <text x="860" y="340" text-anchor="middle">de éxito</text>

  <!-- Extends: Actualizar ranking final -->
  <ellipse cx="670" cy="530" rx="95" ry="24" fill="#d6e4f7" stroke="#2E4A7A" stroke-width="1.2"/>
  <text x="670" y="526" text-anchor="middle">Actualizar ranking</text>
  <text x="670" y="540" text-anchor="middle">final de jugadores</text>

  <!-- Extends: Aplicar diseño responsive -->
  <ellipse cx="220" cy="190" rx="80" ry="22" fill="#f0f8f0" stroke="#4a7a2e" stroke-width="1"/>
  <text x="220" y="186" text-anchor="middle" font-size="9">Aplicar diseño</text>
  <text x="220" y="200" text-anchor="middle" font-size="9">responsive</text>

  <!-- Extends: Respetar estilo gráfico -->
  <ellipse cx="220" cy="370" rx="80" ry="22" fill="#f0f8f0" stroke="#4a7a2e" stroke-width="1"/>
  <text x="220" y="366" text-anchor="middle" font-size="9">Respetar estilo</text>
  <text x="220" y="380" text-anchor="middle" font-size="9">gráfico</text>

  <!-- LÍNEAS -->
  <line x1="74" y1="280" x2="290" y2="280" stroke="#333" stroke-width="1.3"/>

  <!-- -use-> navbar -->
  <line x1="390" y1="250" x2="390" y2="114" stroke="#2E4A7A" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#blu)"/>
  <text x="363" y="183" font-size="8" fill="#2E4A7A">«use»</text>

  <!-- navbar Extends navegar -->
  <line x1="330" y1="76" x2="305" y2="65" stroke="#333" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="452" y1="76" x2="475" y2="65" stroke="#333" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- -use-> Ingresar sets -->
  <line x1="488" y1="263" x2="575" y2="162" stroke="#2E4A7A" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#blu)"/>
  <text x="527" y="205" text-anchor="middle" font-size="8" fill="#2E4A7A">«use»</text>

  <!-- -use-> Validar resultado -->
  <line x1="490" y1="278" x2="575" y2="247" stroke="#2E4A7A" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#blu)"/>
  <text x="530" y="257" text-anchor="middle" font-size="8" fill="#2E4A7A">«use»</text>

  <!-- -use-> Guardar partido -->
  <line x1="490" y1="292" x2="575" y2="336" stroke="#2E4A7A" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#blu)"/>
  <text x="530" y="323" text-anchor="middle" font-size="8" fill="#2E4A7A">«use»</text>

  <!-- -use-> Actualizar posiciones -->
  <line x1="475" y1="302" x2="575" y2="422" stroke="#2E4A7A" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#blu)"/>
  <text x="522" y="370" text-anchor="middle" font-size="8" fill="#2E4A7A">«use»</text>

  <!-- Actualizar posiciones -use-> Generar playoff (trigger) -->
  <line x1="575" y1="430" x2="485" y2="430" stroke="#2E4A7A" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#blu)"/>
  <text x="527" y="418" text-anchor="middle" font-size="8" fill="#2E4A7A">«use»</text>

  <!-- Generar playoff -use-> Registrar playoff -->
  <line x1="390" y1="454" x2="390" y2="506" stroke="#2E4A7A" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#blu)"/>
  <text x="363" y="482" font-size="8" fill="#2E4A7A">«use»</text>

  <!-- Registrar playoff -use-> Actualizar ranking -->
  <line x1="485" y1="536" x2="575" y2="536" stroke="#2E4A7A" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#blu)"/>
  <text x="530" y="524" text-anchor="middle" font-size="8" fill="#2E4A7A">«use»</text>

  <!-- Validar Extends→ Mostrar error -->
  <line x1="765" y1="240" x2="772" y2="240" stroke="#333" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="808" y="228" font-size="8">Extends</text>

  <!-- Guardar Extends→ Mostrar éxito -->
  <line x1="765" y1="330" x2="772" y2="330" stroke="#333" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="808" y="318" font-size="8">Extends</text>

  <!-- Responsive Extends→ Cargar resultados -->
  <line x1="284" y1="200" x2="310" y2="262" stroke="#4a7a2e" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="282" y="238" font-size="8" fill="#4a7a2e">Extends</text>

  <!-- Estilo gráfico Extends→ Cargar resultados -->
  <line x1="284" y1="357" x2="310" y2="302" stroke="#4a7a2e" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="280" y="326" font-size="8" fill="#4a7a2e">Extends</text>

  <!-- Leyenda -->
  <rect x="160" y="548" width="355" height="44" rx="3" fill="#f9f9f9" stroke="#ccc"/>
  <text x="338" y="563" text-anchor="middle" font-weight="bold" font-size="9">Leyenda</text>
  <line x1="170" y1="576" x2="205" y2="576" stroke="#2E4A7A" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#blu)"/>
  <text x="210" y="580" font-size="8">«use» — incluye el caso de uso</text>
  <line x1="170" y1="588" x2="205" y2="588" stroke="#333" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="210" y="592" font-size="8">Extends — comportamiento alternativo/extendido</text>
</svg>
