<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" font-family="Arial,sans-serif" font-size="10">
  <rect width="640" height="360" fill="white"/>
  <text x="320" y="18" text-anchor="middle" font-size="13" font-weight="bold">Diagrama de Secuencia — Login</text>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0,0 8,3.5 0,7" fill="#333"/>
    </marker>
    <marker id="open" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7" fill="none" stroke="#333" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Lifeline headers -->
  <rect x="30" y="30" width="90" height="28" rx="3" fill="#2E4A7A"/>
  <text x="75" y="48" text-anchor="middle" fill="white" font-weight="bold">Usuario</text>
  <rect x="180" y="30" width="90" height="28" rx="3" fill="#2E4A7A"/>
  <text x="225" y="48" text-anchor="middle" fill="white" font-weight="bold">Frontend</text>
  <rect x="330" y="30" width="100" height="28" rx="3" fill="#4a7a2e"/>
  <text x="380" y="48" text-anchor="middle" fill="white" font-weight="bold">Backend API</text>
  <rect x="500" y="30" width="100" height="28" rx="3" fill="#7a2e2e"/>
  <text x="550" y="48" text-anchor="middle" fill="white" font-weight="bold">Base de Datos</text>

  <!-- Lifelines (vertical dashed) -->
  <line x1="75" y1="58" x2="75" y2="355" stroke="#999" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="225" y1="58" x2="225" y2="355" stroke="#999" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="380" y1="58" x2="380" y2="355" stroke="#999" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="550" y1="58" x2="550" y2="355" stroke="#999" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- 1. Usuario → Frontend: ingresa credenciales -->
  <line x1="75" y1="90" x2="220" y2="90" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="148" y="85" text-anchor="middle" font-size="9">1. ingresa email + contraseña</text>

  <!-- 2. Frontend → Backend: POST /api/login -->
  <line x1="225" y1="115" x2="375" y2="115" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="300" y="110" text-anchor="middle" font-size="9">2. POST /api/login {email, pwd}</text>

  <!-- 3. Backend → DB: SELECT jugador -->
  <line x1="380" y1="140" x2="545" y2="140" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="462" y="135" text-anchor="middle" font-size="9">3. SELECT * FROM jugador WHERE email=?</text>

  <!-- 4. DB → Backend: jugador row -->
  <line x1="545" y1="165" x2="385" y2="165" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="462" y="178" text-anchor="middle" font-size="9">4. {id, email, password_hash, rol}</text>

  <!-- 5. Backend: bcrypt.compare() -->
  <rect x="345" y="183" width="70" height="18" rx="2" fill="#f0f8e8" stroke="#4a7a2e"/>
  <text x="380" y="195" text-anchor="middle" font-size="8">5. bcrypt.compare()</text>

  <!-- 6. Backend → DB: INSERT audit_log -->
  <line x1="380" y1="215" x2="545" y2="215" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="462" y="210" text-anchor="middle" font-size="9">6. INSERT audit_log_ingresos</text>

  <!-- 7. DB → Backend: ok -->
  <line x1="545" y1="235" x2="385" y2="235" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="462" y="248" text-anchor="middle" font-size="9">7. OK</text>

  <!-- 8. Backend: jwt.sign() -->
  <rect x="345" y="255" width="70" height="18" rx="2" fill="#f0f8e8" stroke="#4a7a2e"/>
  <text x="380" y="267" text-anchor="middle" font-size="8">8. jwt.sign(payload)</text>

  <!-- 9. Backend → Frontend: {token, rol, nombre} -->
  <line x1="375" y1="285" x2="230" y2="285" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="302" y="280" text-anchor="middle" font-size="9">9. {token, rol, nombre}</text>

  <!-- 10. Frontend → Usuario: redirige -->
  <line x1="220" y1="310" x2="80" y2="310" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="148" y="305" text-anchor="middle" font-size="9">10. redirige según rol</text>
</svg>
