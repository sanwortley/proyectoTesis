<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 660" font-family="Arial,sans-serif" font-size="10">
  <rect width="1050" height="660" fill="white"/>
  <text x="525" y="17" text-anchor="middle" font-size="13" font-weight="bold">UCU — Módulo Crear Torneo / Administración</text>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7" fill="none" stroke="#333" stroke-width="1.2"/>
    </marker>
    <marker id="blu" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7" fill="none" stroke="#2E4A7A" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Boundary -->
  <rect x="140" y="28" width="890" height="610" rx="6" fill="#f7f9fc" stroke="#2E4A7A" stroke-width="1.5"/>
  <text x="585" y="46" text-anchor="middle" font-size="10" font-weight="bold" fill="#2E4A7A">Sistema — Módulo Crear Torneo</text>

  <!-- Actor: Organizador -->
  <circle cx="60" cy="290" r="14" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="304" x2="60" y2="340" stroke="#333" stroke-width="1.5"/>
  <line x1="42" y1="318" x2="78" y2="318" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="340" x2="42" y2="363" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="340" x2="78" y2="363" stroke="#333" stroke-width="1.5"/>
  <text x="60" y="377" text-anchor="middle" font-size="9">Organizador</text>
  <text x="60" y="389" text-anchor="middle" font-size="9">(Admin)</text>

  <!-- UC CENTRAL: Crear Torneo -->
  <ellipse cx="390" cy="290" rx="92" ry="30" fill="#d6e4f7" stroke="#2E4A7A" stroke-width="2"/>
  <text x="390" y="286" text-anchor="middle" font-weight="bold">Crear Torneo</text>
  <text x="390" y="300" text-anchor="middle" font-size="9">(módulo principal)</text>

  <!-- UC: Mostrar navbar -->
  <ellipse cx="390" cy="90" rx="90" ry="24" fill="#e8f0fb" stroke="#2E4A7A" stroke-width="1.2"/>
  <text x="390" y="95" text-anchor="middle">Mostrar navbar</text>

  <!-- Navbar Extends: 5 navegaciones -->
  <ellipse cx="230" cy="55" rx="75" ry="20" fill="#f0f4f0" stroke="#888" stroke-width="1"/>
  <text x="230" y="60" text-anchor="middle" font-size="8.5">Navegar home</text>

  <ellipse cx="390" cy="40" rx="80" ry="18" fill="#f0f4f0" stroke="#888" stroke-width="1"/>
  <text x="390" y="44" text-anchor="middle" font-size="8.5">Navegar cargar resultado</text>

  <ellipse cx="560" cy="55" rx="72" ry="20" fill="#f0f4f0" stroke="#888" stroke-width="1"/>
  <text x="560" y="60" text-anchor="middle" font-size="8.5">Navegar Ranking</text>

  <ellipse cx="700" cy="60" rx="72" ry="20" fill="#f0f4f0" stroke="#888" stroke-width="1"/>
  <text x="700" y="65" text-anchor="middle" font-size="8.5">Navegar transmisión</text>

  <ellipse cx="840" cy="90" rx="72" ry="20" fill="#f0f4f0" stroke="#888" stroke-width="1"/>
  <text x="840" y="95" text-anchor="middle" font-size="8.5">Navegar subir fotos</text>

  <!-- UC: Completar campos -->
  <ellipse cx="660" cy="170" rx="90" ry="24" fill="#e8f0fb" stroke="#2E4A7A" stroke-width="1.2"/>
  <text x="660" y="175" text-anchor="middle">Completar campos</text>

  <!-- UC: Validar fechas -->
  <ellipse cx="660" cy="260" rx="90" ry="24" fill="#e8f0fb" stroke="#2E4A7A" stroke-width="1.2"/>
  <text x="660" y="265" text-anchor="middle">Validar fechas</text>

  <!-- UC: Validar campos obligatorios -->
  <ellipse cx="660" cy="350" rx="90" ry="24" fill="#e8f0fb" stroke="#2E4A7A" stroke-width="1.2"/>
  <text x="660" y="346" text-anchor="middle">Validar campos</text>
  <text x="660" y="360" text-anchor="middle">obligatorios</text>

  <!-- UC: Guardar torneo en BD -->
  <ellipse cx="660" cy="450" rx="90" ry="24" fill="#e8f0fb" stroke="#2E4A7A" stroke-width="1.2"/>
  <text x="660" y="446" text-anchor="middle">Guardar torneo</text>
  <text x="660" y="460" text-anchor="middle">en BD</text>

  <!-- UC: Generar grupos -->
  <ellipse cx="390" cy="430" rx="88" ry="24" fill="#e8f0fb" stroke="#2E4A7A" stroke-width="1.2"/>
  <text x="390" y="435" text-anchor="middle">Generar grupos</text>

  <!-- UC: Eliminar equipo -->
  <ellipse cx="390" cy="530" rx="88" ry="24" fill="#e8f0fb" stroke="#2E4A7A" stroke-width="1.2"/>
  <text x="390" y="535" text-anchor="middle">Eliminar equipo</text>

  <!-- UC: Eliminar torneo -->
  <ellipse cx="660" cy="555" rx="88" ry="24" fill="#e8f0fb" stroke="#2E4A7A" stroke-width="1.2"/>
  <text x="660" y="560" text-anchor="middle">Eliminar torneo</text>

  <!-- Extends: Aplicar diseño responsive -->
  <ellipse cx="210" cy="185" rx="85" ry="24" fill="#f0f8f0" stroke="#4a7a2e" stroke-width="1"/>
  <text x="210" y="181" text-anchor="middle" font-size="9">Aplicar diseño</text>
  <text x="210" y="195" text-anchor="middle" font-size="9">responsive</text>

  <!-- Extends: Respetar estilo gráfico -->
  <ellipse cx="210" cy="380" rx="85" ry="24" fill="#f0f8f0" stroke="#4a7a2e" stroke-width="1"/>
  <text x="210" y="376" text-anchor="middle" font-size="9">Respetar estilo</text>
  <text x="210" y="390" text-anchor="middle" font-size="9">gráfico</text>

  <!-- Extends: Mostrar error de fecha inválida -->
  <ellipse cx="870" cy="260" rx="95" ry="24" fill="#fce8e8" stroke="#c00" stroke-width="1.2"/>
  <text x="870" y="256" text-anchor="middle">Mostrar error de</text>
  <text x="870" y="270" text-anchor="middle">fecha inválida</text>

  <!-- Extends: Mostrar error de validación -->
  <ellipse cx="870" cy="350" rx="95" ry="24" fill="#fce8e8" stroke="#c00" stroke-width="1.2"/>
  <text x="870" y="346" text-anchor="middle">Mostrar error de</text>
  <text x="870" y="360" text-anchor="middle">validación</text>

  <!-- Extends: Mostrar mensaje de confirmación -->
  <ellipse cx="210" cy="290" rx="85" ry="24" fill="#e8fce8" stroke="#4a7a2e" stroke-width="1.2"/>
  <text x="210" y="286" text-anchor="middle">Mostrar mensaje</text>
  <text x="210" y="300" text-anchor="middle">de confirmación</text>

  <!-- Extends: Validar acción de eliminación -->
  <ellipse cx="210" cy="530" rx="85" ry="24" fill="#fce8e8" stroke="#c00" stroke-width="1.2"/>
  <text x="210" y="526" text-anchor="middle">Validar acción</text>
  <text x="210" y="540" text-anchor="middle">de eliminación</text>

  <!-- Extends: Mostrar mensaje éxito -->
  <ellipse cx="390" cy="610" rx="88" ry="22" fill="#e8fce8" stroke="#4a7a2e" stroke-width="1.2"/>
  <text x="390" y="615" text-anchor="middle">Mostrar mensaje de éxito</text>

  <!-- Extends: Mostrar error al eliminar -->
  <ellipse cx="660" cy="620" rx="88" ry="22" fill="#fce8e8" stroke="#c00" stroke-width="1.2"/>
  <text x="660" y="625" text-anchor="middle">Mostrar error al eliminar</text>

  <!-- LÍNEAS -->
  <!-- Actor → Crear Torneo -->
  <line x1="74" y1="290" x2="298" y2="290" stroke="#333" stroke-width="1.3"/>

  <!-- Crear Torneo -use-> Mostrar navbar -->
  <line x1="390" y1="260" x2="390" y2="114" stroke="#2E4A7A" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#blu)"/>
  <text x="363" y="185" font-size="8" fill="#2E4A7A">«use»</text>

  <!-- Mostrar navbar Extends → 5 navegaciones -->
  <line x1="328" y1="76" x2="285" y2="68" stroke="#333" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="365" y1="66" x2="390" y2="58" stroke="#333" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="455" y1="76" x2="505" y2="68" stroke="#333" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="472" y1="80" x2="638" y2="68" stroke="#333" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="475" y1="85" x2="778" y2="88" stroke="#333" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="480" y="55" font-size="7.5" fill="#555">Extends (×5 navegaciones)</text>

  <!-- Crear Torneo -use-> Completar campos -->
  <line x1="480" y1="273" x2="570" y2="180" stroke="#2E4A7A" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#blu)"/>
  <text x="522" y="222" text-anchor="middle" font-size="8" fill="#2E4A7A">«use»</text>

  <!-- Crear Torneo -use-> Validar fechas -->
  <line x1="482" y1="287" x2="570" y2="266" stroke="#2E4A7A" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#blu)"/>
  <text x="524" y="273" text-anchor="middle" font-size="8" fill="#2E4A7A">«use»</text>

  <!-- Crear Torneo -use-> Validar campos -->
  <line x1="482" y1="300" x2="570" y2="352" stroke="#2E4A7A" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#blu)"/>
  <text x="523" y="335" text-anchor="middle" font-size="8" fill="#2E4A7A">«use»</text>

  <!-- Crear Torneo -use-> Guardar BD -->
  <line x1="460" y1="312" x2="570" y2="443" stroke="#2E4A7A" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#blu)"/>
  <text x="510" y="388" text-anchor="middle" font-size="8" fill="#2E4A7A">«use»</text>

  <!-- Crear Torneo -use-> Generar grupos -->
  <line x1="390" y1="320" x2="390" y2="406" stroke="#2E4A7A" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#blu)"/>
  <text x="363" y="365" font-size="8" fill="#2E4A7A">«use»</text>

  <!-- Guardar BD -use-> Eliminar equipo -->
  <line x1="570" y1="455" x2="478" y2="530" stroke="#2E4A7A" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#blu)"/>
  <text x="518" y="495" text-anchor="middle" font-size="8" fill="#2E4A7A">«use»</text>

  <!-- Guardar BD -use-> Eliminar torneo -->
  <line x1="660" y1="474" x2="660" y2="531" stroke="#2E4A7A" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#blu)"/>
  <text x="633" y="505" font-size="8" fill="#2E4A7A">«use»</text>

  <!-- Validar fechas Extends→ error fecha -->
  <line x1="750" y1="260" x2="775" y2="260" stroke="#333" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="800" y="248" font-size="8">Extends</text>

  <!-- Validar campos Extends→ error validación -->
  <line x1="750" y1="350" x2="775" y2="350" stroke="#333" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="800" y="338" font-size="8">Extends</text>

  <!-- Crear Torneo Extends→ Mostrar confirmación -->
  <line x1="308" y1="278" x2="285" y2="298" stroke="#333" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="265" y="280" font-size="8">Extends</text>

  <!-- Crear Torneo Extends→ Aplicar responsive -->
  <line x1="308" y1="270" x2="285" y2="200" stroke="#4a7a2e" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="268" y="230" font-size="8" fill="#4a7a2e">Extends</text>

  <!-- Crear Torneo Extends→ Respetar estilo -->
  <line x1="310" y1="308" x2="285" y2="370" stroke="#4a7a2e" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="267" y="345" font-size="8" fill="#4a7a2e">Extends</text>

  <!-- Eliminar equipo Extends→ Validar acción -->
  <line x1="302" y1="530" x2="285" y2="530" stroke="#333" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="273" y="518" font-size="8">Extends</text>

  <!-- Eliminar equipo Extends→ Mostrar éxito -->
  <line x1="390" y1="554" x2="390" y2="588" stroke="#333" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="363" y="573" font-size="8">Extends</text>

  <!-- Eliminar torneo Extends→ Mostrar éxito -->
  <line x1="572" y1="570" x2="478" y2="600" stroke="#333" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- Eliminar torneo Extends→ Mostrar error al eliminar -->
  <line x1="660" y1="579" x2="660" y2="598" stroke="#333" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="633" y="591" font-size="8">Extends</text>

  <!-- Generar grupos Extends→ Mostrar error al eliminar (excepción en generación) -->
  <line x1="450" y1="445" x2="572" y2="618" stroke="#333" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="490" y="545" font-size="8">Extends (error)</text>

  <!-- Leyenda -->
  <rect x="155" y="625" width="355" height="26" rx="3" fill="#f9f9f9" stroke="#ccc"/>
  <line x1="165" y1="638" x2="195" y2="638" stroke="#2E4A7A" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#blu)"/>
  <text x="200" y="642" font-size="8">«use» — incluye</text>
  <line x1="290" y1="638" x2="320" y2="638" stroke="#333" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="325" y="642" font-size="8">Extends — alternativo/extendido</text>
</svg>
