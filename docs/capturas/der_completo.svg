<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1175 740" font-family="Arial,sans-serif" font-size="9.5">
  <rect width="1175" height="740" fill="white"/>

  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7" fill="none" stroke="#444" stroke-width="1.3"/>
    </marker>
    <marker id="arrd" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7" fill="none" stroke="#888" stroke-width="1.3"/>
    </marker>
  </defs>

  <!-- ══════════════════════════════════════════
       FILA 0 — Entidades de autenticación / torneo
       y=30 a y≈230
       ════════════════════════════════════════ -->

  <!-- CATEGORIA  x=20 y=175 -->
  <rect x="20" y="175" width="155" height="18" rx="2" fill="#2E4A7A"/>
  <text x="97" y="188" text-anchor="middle" fill="white" font-weight="bold">categoria</text>
  <rect x="20" y="193" width="155" height="52" fill="white" stroke="#2E4A7A" stroke-width="1.2"/>
  <text x="30" y="206" font-style="italic" fill="#c00">id_categoria (PK)</text>
  <text x="30" y="219">nombre</text>
  <text x="30" y="232">valor_numerico</text>

  <!-- JUGADOR  x=195 y=30 -->
  <rect x="195" y="30" width="190" height="18" rx="2" fill="#2E4A7A"/>
  <text x="290" y="43" text-anchor="middle" fill="white" font-weight="bold">jugador</text>
  <rect x="195" y="48" width="190" height="188" fill="white" stroke="#2E4A7A" stroke-width="1.2"/>
  <text x="205" y="61" font-style="italic" fill="#c00">id_jugador (PK)</text>
  <text x="205" y="74">nombre_jugador</text>
  <text x="205" y="87">apellido_jugador</text>
  <text x="205" y="100">apodo</text>
  <text x="205" y="113">email (UNIQUE)</text>
  <text x="205" y="126">telefono</text>
  <text x="205" y="139">password (hash)</text>
  <text x="205" y="152">rol</text>
  <text x="205" y="165">fecha_registro</text>
  <text x="205" y="178" fill="#777">categoria_id (FK)</text>
  <text x="205" y="191">foto_perfil</text>

  <!-- TORNEO  x=495 y=30 -->
  <rect x="495" y="30" width="210" height="18" rx="2" fill="#2E4A7A"/>
  <text x="600" y="43" text-anchor="middle" fill="white" font-weight="bold">torneo</text>
  <rect x="495" y="48" width="210" height="188" fill="white" stroke="#2E4A7A" stroke-width="1.2"/>
  <text x="505" y="61" font-style="italic" fill="#c00">id_torneo (PK)</text>
  <text x="505" y="74">nombre_torneo</text>
  <text x="505" y="87">fecha_inicio</text>
  <text x="505" y="100">fecha_fin</text>
  <text x="505" y="113">fecha_cierre_inscripcion</text>
  <text x="505" y="126">max_equipos</text>
  <text x="505" y="139" fill="#777">categoria_id (FK)</text>
  <text x="505" y="152">formato_categoria</text>
  <text x="505" y="165">suma_categoria</text>
  <text x="505" y="178">modalidad</text>
  <text x="505" y="191">dias_juego</text>

  <!-- EQUIPO  x=825 y=30 -->
  <rect x="825" y="30" width="175" height="18" rx="2" fill="#4a7a2e"/>
  <text x="912" y="43" text-anchor="middle" fill="white" font-weight="bold">equipo</text>
  <rect x="825" y="48" width="175" height="65" fill="white" stroke="#4a7a2e" stroke-width="1.2"/>
  <text x="835" y="61" font-style="italic" fill="#c00">id_equipo (PK)</text>
  <text x="835" y="74" fill="#777">jugador1_id (FK)</text>
  <text x="835" y="87" fill="#777">jugador2_id (FK)</text>
  <text x="835" y="100">nombre_equipo</text>

  <!-- INSCRIPCION  x=825 y=150 -->
  <rect x="825" y="150" width="175" height="18" rx="2" fill="#4a7a2e"/>
  <text x="912" y="163" text-anchor="middle" fill="white" font-weight="bold">inscripcion</text>
  <rect x="825" y="168" width="175" height="65" fill="white" stroke="#4a7a2e" stroke-width="1.2"/>
  <text x="835" y="181" font-style="italic" fill="#c00">id_inscripcion (PK)</text>
  <text x="835" y="194" fill="#777">id_equipo (FK)</text>
  <text x="835" y="207" fill="#777">id_torneo (FK)</text>
  <text x="835" y="220">created_at</text>

  <!-- ══════════════════════════════════════════
       FILA 2 — Grupos / Fixture / Auditoría
       y=305 a y≈510
       Carril de ruteo entre filas en y=262
       ════════════════════════════════════════ -->

  <!-- EQUIPOS_GRUPO  x=20 y=305 -->
  <rect x="20" y="305" width="205" height="18" rx="2" fill="#7a5a2e"/>
  <text x="122" y="318" text-anchor="middle" fill="white" font-weight="bold">equipos_grupo</text>
  <rect x="20" y="323" width="205" height="135" fill="white" stroke="#7a5a2e" stroke-width="1.2"/>
  <text x="30" y="336" font-style="italic" fill="#c00">id (PK)</text>
  <text x="30" y="349" fill="#777">grupo_id (FK)</text>
  <text x="30" y="362" fill="#777">equipo_id (FK)</text>
  <text x="30" y="375">puntos</text>
  <text x="30" y="388">partidos_jugados</text>
  <text x="30" y="401">sets_favor / sets_contra</text>
  <text x="30" y="414">games_favor / games_contra</text>

  <!-- GRUPOS  x=280 y=305 -->
  <rect x="280" y="305" width="175" height="18" rx="2" fill="#7a5a2e"/>
  <text x="367" y="318" text-anchor="middle" fill="white" font-weight="bold">grupos</text>
  <rect x="280" y="323" width="175" height="52" fill="white" stroke="#7a5a2e" stroke-width="1.2"/>
  <text x="290" y="336" font-style="italic" fill="#c00">id_grupo (PK)</text>
  <text x="290" y="349" fill="#777">id_torneo (FK)</text>
  <text x="290" y="362">nombre</text>

  <!-- PARTIDOS_LLAVE  x=495 y=305 -->
  <rect x="495" y="305" width="210" height="18" rx="2" fill="#7a2e2e"/>
  <text x="600" y="318" text-anchor="middle" fill="white" font-weight="bold">partidos_llave</text>
  <rect x="495" y="323" width="210" height="200" fill="white" stroke="#7a2e2e" stroke-width="1.2"/>
  <text x="505" y="336" font-style="italic" fill="#c00">id (PK)</text>
  <text x="505" y="349" fill="#777">id_torneo (FK)</text>
  <text x="505" y="362">ronda</text>
  <text x="505" y="375">orden</text>
  <text x="505" y="388" fill="#777">equipo1_id (FK)</text>
  <text x="505" y="401" fill="#777">equipo2_id (FK)</text>
  <text x="505" y="414">set1..set3 por equipo</text>
  <text x="505" y="427">estado</text>
  <text x="505" y="440" fill="#777">ganador_id (FK)</text>
  <text x="505" y="453" fill="#777">next_match_id (FK self)</text>
  <text x="505" y="466">next_slot</text>

  <!-- AUDIT_LOG  x=775 y=305 -->
  <rect x="775" y="305" width="185" height="18" rx="2" fill="#555"/>
  <text x="867" y="318" text-anchor="middle" fill="white" font-weight="bold">audit_log_ingresos</text>
  <rect x="775" y="323" width="185" height="148" fill="white" stroke="#555" stroke-width="1.2"/>
  <text x="785" y="336" font-style="italic" fill="#c00">id (PK)</text>
  <text x="785" y="349" fill="#777">jugador_id (FK, NULL)</text>
  <text x="785" y="362">nombre / apellido</text>
  <text x="785" y="375">ip</text>
  <text x="785" y="388">user_agent</text>
  <text x="785" y="401">exitoso</text>
  <text x="785" y="414">motivo</text>
  <text x="785" y="427">timestamp</text>

  <!-- ══════════════════════════════════════════
       FILA 3 — Partidos de Grupo / Ranking / Multimedia
       y=505 a y≈680
       Carril entre filas 2-3 en y=480
       ════════════════════════════════════════ -->

  <!-- PARTIDOS_GRUPO  x=20 y=510 -->
  <rect x="20" y="510" width="200" height="18" rx="2" fill="#7a2e2e"/>
  <text x="120" y="523" text-anchor="middle" fill="white" font-weight="bold">partidos_grupo</text>
  <rect x="20" y="528" width="200" height="160" fill="white" stroke="#7a2e2e" stroke-width="1.2"/>
  <text x="30" y="541" font-style="italic" fill="#c00">id (PK)</text>
  <text x="30" y="554" fill="#777">grupo_id (FK)</text>
  <text x="30" y="567" fill="#777">equipo1_id (FK)</text>
  <text x="30" y="580" fill="#777">equipo2_id (FK)</text>
  <text x="30" y="593">set1_eq1 / set1_eq2</text>
  <text x="30" y="606">set2_eq1 / set2_eq2</text>
  <text x="30" y="619">set3_eq1 / set3_eq2</text>
  <text x="30" y="632">fecha</text>
  <text x="30" y="645">estado</text>

  <!-- RANKING_JUGADOR  x=250 y=510 -->
  <rect x="250" y="510" width="185" height="18" rx="2" fill="#555"/>
  <text x="342" y="523" text-anchor="middle" fill="white" font-weight="bold">ranking_jugador</text>
  <rect x="250" y="528" width="185" height="148" fill="white" stroke="#555" stroke-width="1.2"/>
  <text x="260" y="541" font-style="italic" fill="#c00">id (PK)</text>
  <text x="260" y="554" fill="#777">jugador_id (FK)</text>
  <text x="260" y="567">nombre / apellido</text>
  <text x="260" y="580">ultima_pareja</text>
  <text x="260" y="593">torneo_participado</text>
  <text x="260" y="606">fase_llegada</text>
  <text x="260" y="619">puntos</text>
  <text x="260" y="632">categoria</text>

  <!-- MULTIMEDIA  x=775 y=490 -->
  <rect x="775" y="490" width="175" height="18" rx="2" fill="#2e5a7a"/>
  <text x="862" y="503" text-anchor="middle" fill="white" font-weight="bold">multimedia</text>
  <rect x="775" y="508" width="175" height="96" fill="white" stroke="#2e5a7a" stroke-width="1.2"/>
  <text x="785" y="521" font-style="italic" fill="#c00">id_foto (PK)</text>
  <text x="785" y="534" fill="#777">id_torneo (FK)</text>
  <text x="785" y="547">url</text>
  <text x="785" y="560">fecha</text>
  <text x="785" y="573">categoria_visual</text>

  <!-- TRANSMISION  x=965 y=490 -->
  <rect x="965" y="490" width="185" height="18" rx="2" fill="#2e5a7a"/>
  <text x="1057" y="503" text-anchor="middle" fill="white" font-weight="bold">transmision</text>
  <rect x="965" y="508" width="185" height="96" fill="white" stroke="#2e5a7a" stroke-width="1.2"/>
  <text x="975" y="521" font-style="italic" fill="#c00">id_transmision (PK)</text>
  <text x="975" y="534" fill="#777">id_torneo (FK)</text>
  <text x="975" y="547">titulo</text>
  <text x="975" y="560">link</text>
  <text x="975" y="573">fecha_transmision</text>

  <!-- ══════════════════════════════════════════
       RELACIONES — todas en L (sin cruzar entidades)
       ════════════════════════════════════════ -->

  <!-- 1. categoria → jugador  (derecha directa, y=213) -->
  <line x1="175" y1="213" x2="195" y2="213" stroke="#444" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="178" y="209" font-size="8" fill="#333">1:N</text>

  <!-- 2. categoria → torneo  (sube a y=12, cruza por ENCIMA de todo, baja) -->
  <path d="M97,175 L97,12 L600,12 L600,30" fill="none" stroke="#444" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="340" y="9" font-size="8" fill="#555">1 categoría → N torneos</text>

  <!-- 3. jugador → equipo  (sube a y=12, cruza ENCIMA, baja) -->
  <path d="M385,30 L385,12 L912,12 L912,30" fill="none" stroke="#444" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="640" y="9" font-size="8" fill="#555">1 jugador → N equipos</text>

  <!-- 4. equipo → inscripcion  (baja directo) -->
  <line x1="912" y1="113" x2="912" y2="150" stroke="#444" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="917" y="135" font-size="8" fill="#333">1:N</text>

  <!-- 5. torneo → inscripcion  (derecha horizontal a y=160) -->
  <path d="M705,160 L825,160" fill="none" stroke="#444" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="718" y="157" font-size="8" fill="#333">1:N</text>

  <!-- 6. torneo → grupos  (desde x=578, carril y=262, izquierda a grupos) -->
  <path d="M578,236 L578,262 L367,262 L367,305" fill="none" stroke="#444" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="430" y="258" font-size="8" fill="#333">1 torneo → N grupos</text>

  <!-- 7. torneo → partidos_llave  (desde x=622, baja directo sin cruzar la línea anterior) -->
  <line x1="622" y1="236" x2="622" y2="305" stroke="#444" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="626" y="275" font-size="8" fill="#333">1:N</text>

  <!-- 8. grupos → equipos_grupo  (izquierda directa) -->
  <line x1="280" y1="345" x2="225" y2="345" stroke="#444" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="230" y="341" font-size="8" fill="#333">1:N</text>

  <!-- 9. grupos → partidos_grupo
       Baja desde grupos (y=375), carril en y=480 (bajo fila2), izq a x=120, baja a partidos_grupo -->
  <path d="M367,375 L367,480 L120,480 L120,510" fill="none" stroke="#444" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="230" y="477" font-size="8" fill="#333">1:N</text>

  <!-- 10. equipo → equipos_grupo  (sube a y=20, carril propio por encima de entidades,
       jugador→equipo va por y=12 para no solaparse) -->
  <path d="M825,30 L825,20 L122,20 L122,305" fill="none" stroke="#888" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrd)"/>
  <text x="430" y="17" font-size="8" fill="#888">equipo → equipos_grupo</text>

  <!-- 11. jugador → ranking_jugador
       Va por el carril x=237 (entre equipos_grupo right=225 y grupos left=280)
       Baja de y=236 a y=480, luego derecha a ranking -->
  <path d="M290,236 L237,236 L237,480 L342,480 L342,510" fill="none" stroke="#444" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="200" y="360" font-size="8" fill="#333">1:N</text>

  <!-- 12. partidos_llave self-ref (next_match_id) -->
  <path d="M705,453 Q740,480 705,468" fill="none" stroke="#888" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrd)"/>
  <text x="710" y="485" font-size="8" fill="#888">self-ref</text>

  <!-- 13. jugador → audit_log  (carril y=262 libre, luego baja por x=867 DERECHA de partidos_llave=705) -->
  <path d="M385,236 L385,262 L867,262 L867,305" fill="none" stroke="#888" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrd)"/>
  <text x="620" y="258" font-size="8" fill="#888">auditoría</text>

  <!-- 14+15. torneo → multimedia / transmisión
       Ruta: baja a y=236, carril y=262, derecha hasta x=740
       (corredor libre entre partidos_llave derecha=705 y audit_log izquierda=775),
       baja a y=470 (audit termina en y=453, libre aquí), derecha y baja a cada entidad -->
  <path d="M705,236 L705,262 L740,262 L740,470 L862,470 L862,490" fill="none" stroke="#888" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrd)"/>
  <path d="M705,236 L705,262 L740,262 L740,470 L1057,470 L1057,490" fill="none" stroke="#888" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrd)"/>
  <text x="760" y="466" font-size="8" fill="#888">torneo → multimedia / transmisión</text>

  <!-- ══ LEYENDA ══ -->
  <rect x="440" y="670" width="300" height="62" rx="3" fill="#f9f9f9" stroke="#ccc"/>
  <text x="590" y="686" text-anchor="middle" font-weight="bold" font-size="10">Leyenda</text>
  <line x1="455" y1="700" x2="490" y2="700" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="496" y="704" font-size="9">Relación directa (FK)</text>
  <line x1="455" y1="718" x2="490" y2="718" stroke="#888" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrd)"/>
  <text x="496" y="722" font-size="9">Relación indirecta / opcional</text>
  <rect x="455" y="726" width="10" height="7" fill="white" stroke="#c00"/>
  <text x="469" y="732" font-size="8" fill="#c00">PK</text>
  <text x="488" y="732" font-size="8" fill="#777">FK = Clave Foránea</text>
</svg>
