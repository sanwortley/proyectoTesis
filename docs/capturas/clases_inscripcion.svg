<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280" font-family="Arial,sans-serif" font-size="10">
  <rect width="680" height="280" fill="white"/>
  <text x="340" y="18" text-anchor="middle" font-size="13" font-weight="bold">Diagrama de Clases — Inscripción</text>
  <defs>
    <marker id="open" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#333" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- InscripcionForm -->
  <rect x="10" y="30" width="155" height="18" rx="2" fill="#2E4A7A"/>
  <text x="87" y="43" text-anchor="middle" fill="white" font-size="9">«boundary»</text>
  <rect x="10" y="48" width="155" height="18" fill="#dce9f8" stroke="#2E4A7A"/>
  <text x="87" y="61" text-anchor="middle" font-weight="bold">InscripcionForm</text>
  <rect x="10" y="66" width="155" height="52" fill="white" stroke="#2E4A7A"/>
  <text x="20" y="79" font-size="9">– jugador1Id: int</text>
  <text x="20" y="92" font-size="9">– jugador2Id: int</text>
  <text x="20" y="105" font-size="9">– torneoId: int</text>
  <rect x="10" y="118" width="155" height="20" fill="#f0f4fc" stroke="#2E4A7A"/>
  <text x="20" y="131" font-size="9">+ handleSubmit()</text>

  <!-- InscripcionController -->
  <rect x="220" y="30" width="165" height="18" rx="2" fill="#4a7a2e"/>
  <text x="302" y="43" text-anchor="middle" fill="white" font-size="9">«control»</text>
  <rect x="220" y="48" width="165" height="18" fill="#e8f5d8" stroke="#4a7a2e"/>
  <text x="302" y="61" text-anchor="middle" font-weight="bold">InscripcionController</text>
  <rect x="220" y="66" width="165" height="20" fill="white" stroke="#4a7a2e"/>
  <text x="230" y="79" font-size="9">(sin atributos de estado)</text>
  <rect x="220" y="86" width="165" height="52" fill="#f4fcea" stroke="#4a7a2e"/>
  <text x="230" y="99" font-size="9">+ inscribir(j1,j2,torneo)</text>
  <text x="230" y="112" font-size="9">+ validarCupos(id)</text>
  <text x="230" y="125" font-size="9">+ notificarOrganizador()</text>

  <!-- Equipo (entity) -->
  <rect x="445" y="30" width="150" height="18" rx="2" fill="#7a2e2e"/>
  <text x="520" y="43" text-anchor="middle" fill="white" font-size="9">«entity»</text>
  <rect x="445" y="48" width="150" height="18" fill="#f8e8e8" stroke="#7a2e2e"/>
  <text x="520" y="61" text-anchor="middle" font-weight="bold">Equipo</text>
  <rect x="445" y="66" width="150" height="65" fill="white" stroke="#7a2e2e"/>
  <text x="455" y="79" font-size="9">– id_equipo: int (PK)</text>
  <text x="455" y="92" font-size="9">– jugador1_id: int (FK)</text>
  <text x="455" y="105" font-size="9">– jugador2_id: int (FK)</text>
  <text x="455" y="118" font-size="9">– nombre_equipo: varchar</text>

  <!-- Inscripcion (entity) -->
  <rect x="445" y="170" width="150" height="18" rx="2" fill="#7a2e2e"/>
  <text x="520" y="183" text-anchor="middle" fill="white" font-size="9">«entity»</text>
  <rect x="445" y="188" width="150" height="18" fill="#f8e8e8" stroke="#7a2e2e"/>
  <text x="520" y="201" text-anchor="middle" font-weight="bold">Inscripcion</text>
  <rect x="445" y="206" width="150" height="52" fill="white" stroke="#7a2e2e"/>
  <text x="455" y="219" font-size="9">– id_inscripcion: int (PK)</text>
  <text x="455" y="232" font-size="9">– id_equipo: int (FK)</text>
  <text x="455" y="245" font-size="9">– id_torneo: int (FK)</text>
  <text x="455" y="258" font-size="9">– created_at: timestamp</text>

  <!-- Relations -->
  <line x1="165" y1="100" x2="220" y2="100" stroke="#333" stroke-width="1.5" marker-end="url(#open)"/>
  <line x1="385" y1="100" x2="445" y2="80" stroke="#333" stroke-width="1.5" marker-end="url(#open)"/>
  <text x="390" y="88" font-size="8">crea</text>
  <line x1="385" y1="110" x2="445" y2="200" stroke="#333" stroke-width="1.5" marker-end="url(#open)"/>
  <text x="390" y="165" font-size="8">genera</text>
  <!-- Inscripcion → Equipo -->
  <line x1="520" y1="170" x2="520" y2="131" stroke="#555" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#open)"/>
  <text x="525" y="155" font-size="8">1..1</text>
</svg>
