<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 330" font-family="Arial,sans-serif" font-size="10">
  <rect width="640" height="330" fill="white"/>
  <text x="320" y="18" text-anchor="middle" font-size="13" font-weight="bold">Diagrama de Secuencia — Registro</text>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto"><polygon points="0,0 8,3.5 0,7" fill="#333"/></marker>
    <marker id="open" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7" fill="none" stroke="#333" stroke-width="1.2"/></marker>
  </defs>
  <rect x="30" y="30" width="90" height="28" rx="3" fill="#2E4A7A"/>
  <text x="75" y="48" text-anchor="middle" fill="white" font-weight="bold">Jugador</text>
  <rect x="180" y="30" width="90" height="28" rx="3" fill="#2E4A7A"/>
  <text x="225" y="48" text-anchor="middle" fill="white" font-weight="bold">Frontend</text>
  <rect x="330" y="30" width="100" height="28" rx="3" fill="#4a7a2e"/>
  <text x="380" y="48" text-anchor="middle" fill="white" font-weight="bold">Backend API</text>
  <rect x="500" y="30" width="100" height="28" rx="3" fill="#7a2e2e"/>
  <text x="550" y="48" text-anchor="middle" fill="white" font-weight="bold">Base de Datos</text>

  <line x1="75" y1="58" x2="75" y2="325" stroke="#999" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="225" y1="58" x2="225" y2="325" stroke="#999" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="380" y1="58" x2="380" y2="325" stroke="#999" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="550" y1="58" x2="550" y2="325" stroke="#999" stroke-width="1" stroke-dasharray="5,4"/>

  <line x1="75" y1="90" x2="220" y2="90" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="148" y="85" text-anchor="middle" font-size="9">1. completa formulario de registro</text>

  <line x1="225" y1="115" x2="375" y2="115" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="300" y="110" text-anchor="middle" font-size="9">2. POST /api/register {datos}</text>

  <line x1="380" y1="140" x2="545" y2="140" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="462" y="135" text-anchor="middle" font-size="9">3. SELECT email FROM jugador WHERE email=?</text>

  <line x1="545" y1="160" x2="385" y2="160" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="462" y="173" text-anchor="middle" font-size="9">4. [] (email disponible)</text>

  <rect x="345" y="178" width="70" height="18" rx="2" fill="#f0f8e8" stroke="#4a7a2e"/>
  <text x="380" y="190" text-anchor="middle" font-size="8">5. bcrypt.hash(pwd, 10)</text>

  <line x1="380" y1="208" x2="545" y2="208" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="462" y="203" text-anchor="middle" font-size="9">6. INSERT INTO jugador VALUES(...)</text>

  <line x1="545" y1="228" x2="385" y2="228" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="462" y="241" text-anchor="middle" font-size="9">7. {id_jugador: 42}</text>

  <line x1="375" y1="255" x2="230" y2="255" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="302" y="250" text-anchor="middle" font-size="9">8. 201 Created</text>

  <line x1="220" y1="280" x2="80" y2="280" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="148" y="275" text-anchor="middle" font-size="9">9. redirige a /login</text>
</svg>
