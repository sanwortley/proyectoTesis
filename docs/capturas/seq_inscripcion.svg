<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" font-family="Arial,sans-serif" font-size="10">
  <rect width="640" height="340" fill="white"/>
  <text x="320" y="18" text-anchor="middle" font-size="13" font-weight="bold">Diagrama de Secuencia — Inscripción a Torneo</text>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto"><polygon points="0,0 8,3.5 0,7" fill="#333"/></marker>
    <marker id="open" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7" fill="none" stroke="#333" stroke-width="1.2"/></marker>
  </defs>
  <rect x="20" y="30" width="90" height="28" rx="3" fill="#2E4A7A"/>
  <text x="65" y="48" text-anchor="middle" fill="white" font-weight="bold">Jugador</text>
  <rect x="170" y="30" width="90" height="28" rx="3" fill="#2E4A7A"/>
  <text x="215" y="48" text-anchor="middle" fill="white" font-weight="bold">Frontend</text>
  <rect x="320" y="30" width="100" height="28" rx="3" fill="#4a7a2e"/>
  <text x="370" y="48" text-anchor="middle" fill="white" font-weight="bold">Backend API</text>
  <rect x="490" y="30" width="100" height="28" rx="3" fill="#7a2e2e"/>
  <text x="540" y="48" text-anchor="middle" fill="white" font-weight="bold">Base de Datos</text>

  <line x1="65" y1="58" x2="65" y2="335" stroke="#999" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="215" y1="58" x2="215" y2="335" stroke="#999" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="370" y1="58" x2="370" y2="335" stroke="#999" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="540" y1="58" x2="540" y2="335" stroke="#999" stroke-width="1" stroke-dasharray="5,4"/>

  <line x1="65" y1="90" x2="210" y2="90" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="138" y="85" text-anchor="middle" font-size="9">1. selecciona compañero y torneo</text>
  <line x1="215" y1="115" x2="365" y2="115" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="290" y="110" text-anchor="middle" font-size="9">2. POST /api/inscripcion {j1, j2, torneo}</text>
  <line x1="370" y1="140" x2="535" y2="140" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="452" y="135" text-anchor="middle" font-size="9">3. SELECT cupos disponibles</text>
  <line x1="535" y1="160" x2="375" y2="160" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="452" y="173" text-anchor="middle" font-size="9">4. {max_equipos, inscriptos}</text>
  <line x1="370" y1="185" x2="535" y2="185" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="452" y="180" text-anchor="middle" font-size="9">5. INSERT INTO equipo + inscripcion</text>
  <line x1="535" y1="205" x2="375" y2="205" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="452" y="218" text-anchor="middle" font-size="9">6. {nombre_equipo: "García/López"}</text>

  <!-- Resend email -->
  <rect x="335" y="225" width="70" height="18" rx="2" fill="#f0f8e8" stroke="#4a7a2e"/>
  <text x="370" y="237" text-anchor="middle" font-size="8">7. enviar email</text>

  <line x1="365" y1="255" x2="220" y2="255" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="292" y="250" text-anchor="middle" font-size="9">8. 201 {nombre_equipo}</text>
  <line x1="210" y1="278" x2="70" y2="278" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#open)"/>
  <text x="138" y="273" text-anchor="middle" font-size="9">9. muestra modal ¡Inscripción exitosa!</text>
</svg>
